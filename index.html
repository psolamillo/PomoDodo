<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PomoDodo</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="js/tab-switcher.js"></script>
</head>
<body>
    <div class="header">
        <img src="assets/PomoDodoPlaceHolder.png" alt="Logo">
        <h1>PomoDodo</h1>
    </div>

    <div class="main-container">
        <div class="left-section">
            <div class="tabs">
                <button class="tab active">Regular</button>
                <button class="tab">Custom</button>
                <button class="tab">Timer</button>
            </div>

            <div class="timer-card">
                <div class="timer-notification"></div>
                <div class="timer-display">25:00</div>
                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
                <div class="timer-controls">
                    <button class="control-btn cancel-btn">
                        <svg viewBox="0 0 24 24" width="24" height="24">
                            <line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" stroke-width="2"/>
                            <line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" stroke-width="2"/>
                        </svg>
                    </button>
                    <button class="control-btn play-btn">
                        <svg viewBox="0 0 24 24" width="24" height="24">
                            <polygon points="5,3 19,12 5,21" fill="currentColor"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="bottom-panel">
                <div class="panel-tabs">
                    <button class="panel-tab active">Session Log</button>
                    <button class="panel-tab">Stats</button>
                </div>
                <div class="panel-content">
                    <div class="panel-section">
                        <div class="session-input-container">
                            <input type="text" class="session-name-input" placeholder="Enter session name (optional)">
                            <button class="start-session-btn">Start Session</button>
                        </div>
                        <div class="session-list"></div>
                    </div>
                    <div class="panel-section"></div>
                </div>
            </div>
        </div>

        <div class="sidebar">
            <div class="setting-item">
                <span class="setting-label">Work Timer:</span>
                <div class="timer-inputs">
                    <input type="number" class="setting-value work-timer-hours" value="0" min="0" max="23">
                    <span class="time-unit">h</span>
                    <span class="time-separator">:</span>
                    <input type="number" class="setting-value work-timer-minutes" value="25" min="0" max="59">
                    <span class="time-unit">m</span>
                </div>
            </div>
            <div class="setting-item">
                <span class="setting-label">Break Timer:</span>
                <div class="timer-inputs">
                    <input type="number" class="setting-value break-timer-hours" value="0" min="0" max="23">
                    <span class="time-unit">h</span>
                    <span class="time-separator">:</span>
                    <input type="number" class="setting-value break-timer-minutes" value="5" min="0" max="59">
                    <span class="time-unit">m</span>
                </div>
            </div>
            <div class="setting-item">
                <span class="setting-label">Notifications:</span>
                <span class="setting-value">On</span>
            </div>
        </div>
    </div>
</body>
</html>
